name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost/placeholder"
          AUTH_SECRET: "ci-build-secret-min-32-chars-long!!"
